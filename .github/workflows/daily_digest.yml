name: Daily Research Digest

on:
  schedule:
    # UTC 02:00 (KST 11:00), weekdays (Mon-Fri)
    - cron: "0 2 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install .

      - name: Write config.yaml from secret
        run: echo "$CONFIG_YAML" > config.yaml
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}

      - name: Run digest pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m research_trend_bot.main config.yaml
