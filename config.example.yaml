# Research Trend Bot Configuration (secrets & deployment settings)
# Copy this file to config.yaml and customize.
#
# Research interests are now tracked separately in interests.yaml
# (see interests.example.yaml). If interests.yaml exists, its fields
# take precedence over any duplicates here.

email:
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  sender_address: "you@gmail.com"
  sender_name: "Research Trend Bot"
  recipients:
    - "you@gmail.com"

llm:
  scoring_model: "gemini-2.5-flash-lite"
  analysis_model: "gemini-2.5-flash"

